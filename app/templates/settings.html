{% extends "_layout.html" %}
{% block content %}
  <section class="page-head">
    <div>
      <p class="eyebrow">Настройки</p>
      <h1>Параметры</h1>
    </div>
  </section>

  <form method="post" action="/settings" class="form-stack">
    <section class="section-block">
      <div class="panel-title">
        <h2>Плеер</h2>
        <p>Настройки видеоплеера по умолчанию.</p>
      </div>

      <div class="volume-bar settings-volume">
        <button type="button" class="volume-toggle" disabled aria-label="Volume">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </button>
        <input type="range" name="default_volume" min="0" max="1" step="0.01" value="{{ default_volume }}"
               data-volume-slider class="volume-slider"
         style='--volume-pct: {{ "%.0f"|format(default_volume * 100) }}%;' />
        <span data-volume-label class="volume-label">
          {{ "%.0f"|format(default_volume * 100) }}%
        </span>
      </div>
      <p class="status">
        Громкость при первом воспроизведении видео. Можно изменить в любом видео через ползунок плеера.
      </p>
    </section>


    <div class="toolbar">
      <button class="button" type="submit">Сохранить</button>
    </div>
  </form>

  {% endblock %}
