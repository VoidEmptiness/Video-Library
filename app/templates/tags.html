{% extends "_layout.html" %}
{% block content %}
  <section class="page-head">
    <div>
      <p class="eyebrow">Организация</p>
      <h1>Теги</h1>
    </div>
    <div class="head-stats">
      <span>{{ tags|length }} тегов</span>
    </div>
  </section>

  <section class="panel">
    <form method="post" action="/tags/create" class="create-row" novalidate data-custom-validate>
      <label class="field grow">
        <span>Новый тег</span>
        <input name="name" placeholder="Например: family" required />
      </label>
      <label class="field grow-wide">
        <span>Описание (необязательно)</span>
        <input name="description" placeholder="Например: Видео с семейных мероприятий" />
      </label>
      <button class="button create-btn" type="submit">Создать</button>
    </form>
  </section>

  <section class="section-block simple-select-root" data-simple-select-root>
    {% if tags|length == 0 %}
      <div class="empty-state">
        <strong>Тегов пока нет</strong>
        <p>Создайте теги, чтобы быстрее фильтровать видео и собирать виртуальные папки.</p>
      </div>
    {% else %}
      <form method="post" action="/tags/delete-selected" data-confirm="Удалить выбранные теги?">
        <div class="selection-actions">
          <button class="button secondary compact" type="button" data-simple-select-toggle>Выбрать</button>
        </div>
        <div class="bulk-bar" data-simple-select-bar hidden>
          <span data-simple-select-count>0 выбрано</span>
          <button class="button danger ghost compact" type="submit" data-simple-select-submit disabled>Удалить выбранные</button>
        </div>
        <div class="list selectable-list">
          {% for t in tags %}
            <details class="edit-box" data-edit-box="{{ t.id }}">
              <summary>
                <label class="list-row" onclick="event.stopPropagation()" title="{% if t.description %}{{ t.description }}{% endif %}">
                  <span class="list-check">
                    <input type="checkbox" name="tag_ids" value="{{ t.id }}" data-simple-select-item />
                  </span>
                  <span class="chip">#{{ t.name }}</span>
                  {% if t.description %}
                    <span class="list-hint tag-description">{{ t.description }}</span>
                  {% endif %}
                  <span class="list-hint">ID {{ t.id }}</span>
                  <span class="button secondary ghost compact edit-trigger" onclick="event.stopPropagation(); document.querySelector('[data-edit-box=\'{{ t.id }}\']').open = !document.querySelector('[data-edit-box=\'{{ t.id }}\']').open;">✎</span>
                </label>
              </summary>
              <div class="edit-form">
                <div class="form-stack" data-edit-form="{{ t.id }}">
                  <div class="form-grid">
                    <label class="field">
                      <span>Название</span>
                      <input name="name" value="{{ t.name }}" required data-edit-name="{{ t.id }}" />
                    </label>
                    <label class="field">
                      <span>Описание</span>
                      <input name="description" value="{{ t.description or '' }}" placeholder="Необязательно" data-edit-desc="{{ t.id }}" />
                    </label>
                  </div>
                  <div class="edit-actions">
                    <button class="button" type="button" onclick="
                      var name = document.querySelector('[data-edit-name=\'{{ t.id }}\']').value;
                      var desc = document.querySelector('[data-edit-desc=\'{{ t.id }}\']').value;
                      var fd = new FormData();
                      fd.append('name', name);
                      fd.append('description', desc);
                      fetch('/tags/{{ t.id }}/edit', { method: 'POST', body: fd }).then(function(r){ if(r.ok) location.reload(); });
                    ">Сохранить</button>
                    <button class="button secondary ghost compact" type="button" onclick="document.querySelector('[data-edit-box=\'{{ t.id }}\']').open = false;">Отмена</button>
                  </div>
                </div>
              </div>
            </details>
          {% endfor %}
        </div>
      </form>
    {% endif %}
  </section>
{% endblock %}
